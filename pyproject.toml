[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["core*", "gui*"]

[project]
name = "bot-exrate"
version = "3.0.30"
description = "BOT Exchange Rate Processor — Enterprise Desktop Application"
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
    "customtkinter>=5.2.2",
    "openpyxl>=3.1.0",
    "httpx>=0.27.2",
    "tenacity>=9.0.0",
    "xlrd>=2.0.1",
    "pydantic>=2.10.6",
    "python-dotenv>=1.0.1",
    "tkinterdnd2-universal>=1.7.3",
    "packaging>=24.0",
]

[dependency-groups]
dev = [
    "ruff>=0.15.0",
    "pytest>=8.0.0",
]

[tool.ruff]
target-version = "py312"
line-length = 120
exclude = ["scripts/", "data/", ".venv/"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
