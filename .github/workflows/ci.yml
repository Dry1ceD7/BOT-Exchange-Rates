name: CI

on:
  push:
  pull_request:

jobs:
  quality-gate:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies (incl. dev)
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest tests/

  security-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      # Audit the locked project environment (not an ephemeral uvx env).
      # Blocking: a vulnerable transitive/runtime pin fails CI.
      - name: Sync dependencies (incl. dev)
        run: uv sync --dev

      - name: pip-audit
        run: uv run pip-audit
