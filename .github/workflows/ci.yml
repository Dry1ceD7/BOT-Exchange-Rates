name: CI

on:
  push:
  pull_request:

jobs:
  quality-gate:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies (incl. dev)
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest tests/

  security-audit:
    name: Dependency Audit (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: pip-audit
        run: uvx pip-audit
