# ---------------------------------------------------------------------------
# BOT Exchange Rate Processor — V3.0.0 Cross-Platform Release Pipeline
# ---------------------------------------------------------------------------
# Triggers on version tags (v*). Builds standalone executables for
# Windows (.exe), macOS (.app), and Linux (.AppImage) using PyInstaller.
# Uses uv for dependency management per working agreement mandate.
# ---------------------------------------------------------------------------

name: V3 Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── STAGE 1: Lint + Test ────────────────────────────────────────────────
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/ -v

  # ── STAGE 2: Build Matrix ──────────────────────────────────────────────
  build:
    needs: quality-gate
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: BOT-ExRate-Windows
            ext: .exe
          - os: macos-latest
            artifact: BOT-ExRate-macOS
            ext: .app
          - os: ubuntu-latest
            artifact: BOT-ExRate-Linux
            ext: .AppImage
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          # PyInstaller --add-data separator: ';' on Windows, ':' on Unix
          if [[ "$RUNNER_OS" == "Windows" ]]; then SEP=";"; else SEP=":"; fi
          uv run pyinstaller \
            --name "BOT-ExRate" \
            --onefile \
            --windowed \
            --add-data "data${SEP}data" \
            --hidden-import customtkinter \
            --hidden-import tkinterdnd2 \
            --hidden-import openpyxl \
            --hidden-import xlrd \
            --hidden-import httpx \
            --hidden-import pydantic \
            main.py

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/BOT-ExRate*
          retention-days: 30

  # ── STAGE 3: GitHub Release ────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
