# ---------------------------------------------------------------------------
# BOT Exchange Rate Processor — V3 Cross-Platform Release Pipeline
# ---------------------------------------------------------------------------
# Triggers on version tags (v*). Builds standalone executables for
# Windows (.exe installer), macOS (.dmg), and Linux (.tar.gz).
# Uses uv for dependency management per working agreement mandate.
# ---------------------------------------------------------------------------

name: V3 Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── STAGE 1: Lint + Test ────────────────────────────────────────────────
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Pinned for reproducible builds (F171). Keep in sync with ci.yml.
          version: "0.10.11"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      # The packaging-version update comparison, the exe version resource,
      # and the installer AppVersion must all agree — fail the release
      # before building anything if the tag and core/version.py diverge.
      - name: Tag/version consistency gate
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          uv run python - <<'EOF'
          import os
          import sys

          from core.version import __version__

          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{__version__}"
          if tag != expected:
              sys.exit(
                  f"Tag {tag!r} does not match core/version.py ({expected!r})."
                  " Bump core/version.py or retag."
              )
          print(f"Tag matches core/version.py: {tag}")
          EOF
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/ -v

      # Blocking dependency audit against the project env (before artifacts build)
      - name: Dependency audit (pip-audit)
        run: uv run pip-audit

  # ── STAGE 2: Build Matrix ──────────────────────────────────────────────
  build:
    needs: quality-gate
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: BOT-ExRate-Windows
          - os: macos-latest
            artifact: BOT-ExRate-macOS
          - os: ubuntu-latest
            artifact: BOT-ExRate-Linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Pinned for reproducible builds (F171). Keep in sync with ci.yml.
          version: "0.10.11"

      - name: Set up Python 3.12
        run: uv python install 3.12

      # Build tooling (pyinstaller, pillow) comes from the locked "build"
      # dependency group in pyproject.toml — no ad-hoc pip installs at
      # release time, so build inputs are reproducible from uv.lock.
      - name: Install dependencies (runtime + build group)
        run: uv sync --no-dev --group build

      - name: Regenerate HD icon.ico from icon.png
        shell: bash
        run: |
          uv run python -c "
          from PIL import Image
          png = Image.open('assets/icon.png').convert('RGBA')
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          png.save('assets/icon.ico', format='ICO', sizes=sizes)
          print('ICO regenerated with sizes:', sizes)
          "

      # ── Windows: embed a version resource into the .exe ───────────────
      # Without this the produced executable has no FileVersion/ProductVersion
      # metadata (blank "Details" tab in Windows Explorer). Generate a
      # PyInstaller version-info file from core.version.__version__.
      - name: Generate Windows version-info file
        if: runner.os == 'Windows'
        shell: bash
        run: |
          uv run python -c "
          from core.version import __version__
          parts = (__version__.split('.') + ['0', '0', '0', '0'])[:4]
          v = ', '.join(str(int(p)) for p in parts)
          content = f'''VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=({v}),
              prodvers=({v}),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0)
            ),
            kids=[
              StringFileInfo([
                StringTable('040904B0', [
                  StringStruct('CompanyName', 'AAE'),
                  StringStruct('FileDescription', 'BOT Exchange Rate Processor'),
                  StringStruct('FileVersion', '{__version__}'),
                  StringStruct('InternalName', 'BOT-ExRate'),
                  StringStruct('OriginalFilename', 'BOT-ExRate.exe'),
                  StringStruct('ProductName', 'BOT Exchange Rate Processor'),
                  StringStruct('ProductVersion', '{__version__}')
                ])
              ]),
              VarFileInfo([VarStruct('Translation', [1033, 1200])])
            ]
          )'''
          with open('version_info.txt', 'w', encoding='utf-8') as fh:
              fh.write(content)
          print('Wrote version_info.txt for', __version__)
          "

      - name: Build with PyInstaller
        shell: bash
        run: |
          ICON_FLAG=""
          VERSION_FLAG=""
          SEPARATOR=":"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ICON_FLAG="--icon=assets/icon.ico"
            VERSION_FLAG="--version-file=version_info.txt"
            SEPARATOR=";"
          fi
          uv run pyinstaller \
            --name "BOT-ExRate" \
            --onedir \
            --windowed \
            $ICON_FLAG \
            $VERSION_FLAG \
            --add-data "assets${SEPARATOR}assets" \
            --hidden-import customtkinter \
            --hidden-import tkinterdnd2 \
            --hidden-import openpyxl \
            --hidden-import httpx \
            --hidden-import pydantic \
            --exclude-module mcp \
            --exclude-module mcp.server \
            --exclude-module fastmcp \
            --exclude-module pydantic_ai.mcp \
            main.py

      # ── Windows: Inno Setup Installer ─────────────────────────────────
      - name: Build Windows Installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Single source of truth: core/version.py (the consistency gate
          # already proved it matches the tag; workflow_dispatch runs get the
          # real version too instead of the old '0.0.0' fallback).
          $version = (uv run python -c "from core.version import __version__; print(__version__)") | Select-Object -Last 1
          Write-Host "Building installer for version: $version"

          # Inno Setup is pre-installed on windows-latest runners
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=$version `
            installer\installer.iss

          # Verify output
          if (Test-Path "dist\BOT-ExRate-Setup.exe") {
            Write-Host "OK: Installer created: BOT-ExRate-Setup.exe"
            Get-Item "dist\BOT-ExRate-Setup.exe" | Select-Object Length
          } else {
            Write-Error "FAILED: Installer not found!"
            exit 1
          }

      # ── macOS: verify the .app bundle exists before packaging ─────────
      - name: Verify macOS .app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [[ ! -d "dist/BOT-ExRate.app" ]]; then
            echo "FAILED: dist/BOT-ExRate.app is missing — PyInstaller did not produce an .app bundle."
            exit 1
          fi
          echo "OK: Found dist/BOT-ExRate.app"

      # ── macOS: DMG Disk Image ─────────────────────────────────────────
      - name: Build macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Create a staging directory for the DMG contents
          mkdir -p dmg-staging
          # Ship the .app bundle (double-clickable), not the raw onedir folder
          cp -R dist/BOT-ExRate.app dmg-staging/
          ln -s /Applications dmg-staging/Applications

          # Create the DMG
          hdiutil create \
            -volname "BOT Exchange Rate Processor" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            dist/BOT-ExRate-macOS.dmg

          echo "OK: DMG created: BOT-ExRate-macOS.dmg"
          ls -lh dist/BOT-ExRate-macOS.dmg

      # ── Linux: tar.gz (unchanged) ─────────────────────────────────────
      - name: Package Linux distribution
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          tar -czf BOT-ExRate-Linux.tar.gz BOT-ExRate/

      # ── Windows: checksum asset the self-updater REQUIRES ─────────────
      # core/auto_updater.py refuses to download/apply any update without a
      # "<installer>.sha256" release asset (mandatory integrity verify) —
      # v3.5.1 shipped without one, so the in-app updater could not complete
      # an update at all. Windows-only on purpose: the updater only ever
      # downloads the .exe, and clients <= 3.5.1 match ANY *.sha256 asset
      # (last one wins), so publishing dmg/tar.gz checksums too would feed
      # them the wrong digest and fail the verify.
      - name: Generate installer checksum (.sha256)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd dist
          sha256sum BOT-ExRate-Setup.exe > BOT-ExRate-Setup.exe.sha256
          cat BOT-ExRate-Setup.exe.sha256

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/BOT-ExRate-Setup.exe
            dist/BOT-ExRate-Setup.exe.sha256
            dist/BOT-ExRate-macOS.dmg
            dist/BOT-ExRate-Linux.tar.gz
          retention-days: 30

  # ── STAGE 3: GitHub Release ────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
