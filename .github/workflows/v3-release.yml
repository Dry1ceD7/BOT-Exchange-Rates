# ---------------------------------------------------------------------------
# BOT Exchange Rate Processor — V3 Cross-Platform Release Pipeline
# ---------------------------------------------------------------------------
# Triggers on version tags (v*). Builds standalone executables for
# Windows (.exe installer), macOS (.dmg), and Linux (.tar.gz).
# Uses uv for dependency management per working agreement mandate.
# ---------------------------------------------------------------------------

name: V3 Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── STAGE 1: Lint + Test ────────────────────────────────────────────────
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Install system dependencies for Qt
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon-x11-0 xvfb

      - name: Run tests
        run: xvfb-run -a uv run pytest tests/ -v

  # ── STAGE 2: Build Matrix ──────────────────────────────────────────────
  build:
    needs: quality-gate
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: BOT-ExRate-Windows
          - os: macos-latest
            artifact: BOT-ExRate-macOS
          - os: ubuntu-latest
            artifact: BOT-ExRate-Linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller pillow

      - name: Regenerate HD icon.ico from icon.png
        shell: bash
        run: |
          uv run python -c "
          from PIL import Image
          png = Image.open('assets/icon.png').convert('RGBA')
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          png.save('assets/icon.ico', format='ICO', sizes=sizes)
          print('ICO regenerated with sizes:', sizes)
          "

      - name: Build with PyInstaller
        shell: bash
        run: |
          ICON_FLAG=""
          SEPARATOR=":"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ICON_FLAG="--icon=assets/icon.ico"
            SEPARATOR=";"
          fi
          uv run pyinstaller \
            --name "BOT-ExRate" \
            --onedir \
            --windowed \
            $ICON_FLAG \
            --add-data "assets${SEPARATOR}assets" \
            --hidden-import customtkinter \
            --hidden-import tkinterdnd2 \
            --hidden-import openpyxl \
            --hidden-import xlrd \
            --hidden-import httpx \
            --hidden-import pydantic \
            main.py

      # ── Windows: Inno Setup Installer ─────────────────────────────────
      - name: Build Windows Installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Extract version from tag (e.g., v3.0.9 -> 3.0.9)
          $version = "${{ github.ref_name }}".TrimStart("v")
          if (-not $version) { $version = "0.0.0" }
          Write-Host "Building installer for version: $version"

          # Inno Setup is pre-installed on windows-latest runners
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=$version `
            installer\installer.iss

          # Verify output
          if (Test-Path "dist\BOT-ExRate-Setup.exe") {
            Write-Host "✓ Installer created: BOT-ExRate-Setup.exe"
            Get-Item "dist\BOT-ExRate-Setup.exe" | Select-Object Length
          } else {
            Write-Error "✗ Installer not found!"
            exit 1
          }

      # ── macOS: DMG Disk Image ─────────────────────────────────────────
      - name: Build macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Create a staging directory for the DMG contents
          mkdir -p dmg-staging
          cp -R dist/BOT-ExRate dmg-staging/
          ln -s /Applications dmg-staging/Applications

          # Create the DMG
          hdiutil create \
            -volname "BOT Exchange Rate Processor" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            dist/BOT-ExRate-macOS.dmg

          echo "✓ DMG created: BOT-ExRate-macOS.dmg"
          ls -lh dist/BOT-ExRate-macOS.dmg

      # ── Linux: tar.gz (unchanged) ─────────────────────────────────────
      - name: Package Linux distribution
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          tar -czf BOT-ExRate-Linux.tar.gz BOT-ExRate/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/BOT-ExRate-Setup.exe
            dist/BOT-ExRate-macOS.dmg
            dist/BOT-ExRate-Linux.tar.gz
          retention-days: 30

  # ── STAGE 3: GitHub Release ────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
